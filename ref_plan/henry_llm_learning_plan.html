
<style>

      {t:"Feedforward 블록 추가", s:"MLP, GELU 활성화", id:"t21"},
      {t:"GPT-2 style 쌓기", s:"N개 레이어, LayerNorm, Residual", id:"t22"},
      {t:"텍스트 생성(Sampling)", s:"온도(temperature), top-k, top-p", id:"t23"},

  },

const checked = {};
let currentPhase = 0;

function showPhase(idx) {
  currentPhase = idx;
  document.querySelectorAll('.phase-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  renderPhase();
}

function renderPhase() {
  const p = phases[currentPhase];
  const html = `
    <div class="phase-card">
      <div class="phase-header">
        <div class="phase-badge" style="background:${p.color}">${p.badge}</div>
        <div class="phase-meta">
          <div class="phase-title">${currentPhase+1}단계: ${p.title}</div>
          <div class="phase-period">${p.period}</div>
          <div class="phase-desc">${p.desc}</div>
        </div>
      </div>
      <div class="topic-grid">
        ${p.topics.map(tp => `
          <div class="topic-item${checked[tp.id]?' done':''}" onclick="toggle('${tp.id}')" id="item-${tp.id}">
            <div class="topic-check">${checked[tp.id]?'✓':''}</div>
            <div>
              <div class="topic-text">${tp.t}</div>
              <div class="topic-sub">${tp.s}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="resource-section">
        <div class="resource-label">학습 리소스</div>
        <div class="resource-chips">
          ${p.resources.map(r=>`<span class="chip ${r.type}">${r.n}</span>`).join('')}
        </div>
      </div>
      <div class="milestone-row">
        <span class="milestone-icon">${p.milestone.icon}</span>
        <div>
          <div class="milestone-text">마일스톤: ${p.milestone.text}</div>
          <div class="milestone-sub">${p.milestone.sub}</div>
        </div>
      </div>
      <button class="ask-btn" onclick="sendPrompt('${currentPhase+1}단계 ${p.title}에 대해 더 자세하게 설명해줘. 특히 Henry의 교육 현장에 어떻게 활용할 수 있는지 알려줘.')">
        <i class="ti ti-arrow-right" aria-hidden="true"></i> 이 단계 더 자세히 알아보기 ↗
      </button>
    </div>
  `;
  document.getElementById('phase-container').innerHTML = html;
}

function toggle(id) {
  checked[id] = !checked[id];
  const item = document.getElementById('item-'+id);
  item.classList.toggle('done', checked[id]);
  item.querySelector('.topic-check').textContent = checked[id]?'✓':'';
  updateStats();
}

function updateStats() {
  const done = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((done/40)*100);
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('prog-bar').style.width = pct+'%';
  const labels = ['아직 시작 전이에요. 첫 항목을 클릭해 시작해보세요!','잘 시작했어요! 계속 이어가세요 💪','좋은 속도예요! 3단계 구현이 핵심입니다 🔨','절반을 넘었어요! nanoGPT는 경험이 됩니다 🎯','거의 다 왔어요! 마지막 프로젝트가 가장 값집니다 🚀','LLM을 직접 만든 교육자가 되었습니다! 🎉'];
  const li = pct===0?0:pct<25?1:pct<50?2:pct<75?3:pct<100?4:5;
  document.getElementById('prog-label').textContent = labels[li];
}

renderPhase();
</script>
