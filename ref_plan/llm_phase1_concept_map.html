    analogy:"🔬 비유(전자공학 배경 맞춤): 트랜지스터 수를 2배 늘리면 성능이 예측 가능하게 향상되는 무어의 법칙처럼, LLM도 파라미터를 10배 늘리면 손실이 얼마나 줄지 수식으로 예측할 수 있습니다.",
    sizes:[
      {name:"GPT-2", params:"117M", data:"40GB", c:"#B5D4F4"},
      {name:"GPT-3", params:"175B", data:"570GB", c:"#85B7EB"},
      {name:"GPT-4", params:"~1T?", data:"비공개", c:"#534AB7"},
      {name:"EXAONE 3.5", params:"7.8B", data:"한국어 특화", c:"#9FE1CB"}
    ],
    classroom:[
      "핵심 질문: '더 크면 항상 좋은가?' → Chinchilla 법칙(데이터 최적화) 토론",
      "한국어 특화 모델(EXAONE, SOLAR, HyperCLOVA) vs 범용 모델 비교 — 한국 교육 현장에서의 선택 기준",
      "성인반 비즈니스 연결: 클라우드 API 비용 = 파라미터 크기에 비례 → 목적에 맞는 모델 선택의 경제학"
    ],
    tags:["전자공학 연결","한국어 모델","비용 최적화"]
  }
];

function go(idx) {
  document.querySelectorAll('.nav-chip').forEach((c,i)=>c.classList.toggle('on',i===idx));
  if(idx===0){renderOverview();return;}
  renderTopic(idx);
}

function renderOverview() {
  const cards = topics.slice(1).map((t,i)=>`
    <div class="ov-card" onclick="go(${i+1})">
      <div class="ov-icon">${t.icon}</div>
      <div class="ov-title">${t.title.split('(')[0].trim()}</div>
    </div>
  `).join('');
  const flowHtml = `
    <div class="card full">
      <div class="card-head"><div class="card-icon" style="background:#EEEDFE;font-size:20px">🗺️</div>
        <div><div class="card-title">1단계 전체 흐름 — LLM의 탄생 과정</div><div class="card-sub">8개 개념이 연결되는 방식</div></div>
      </div>
      <div class="flow-row" style="flex-wrap:wrap;gap:4px;align-items:center">
        <div class="flow-box" style="background:#E1F5EE;color:#085041">텍스트 입력</div><span class="arrow">→</span>
        <div class="flow-box" style="background:#E1F5EE;color:#085041">② 토큰화</div><span class="arrow">→</span>
        <div class="flow-box" style="background:#E6F1FB;color:#0C447C">③ 임베딩</div><span class="arrow">→</span>
        <div class="flow-box" style="background:#FAEEDA;color:#633806">④ Attention</div><span class="arrow">→</span>
        <div class="flow-box" style="background:#FAECE7;color:#4A1B0C">⑤ Transformer ×N</div><span class="arrow">→</span>
        <div class="flow-box" style="background:#EEEDFE;color:#26215C">⑥ 사전훈련 완료</div><span class="arrow">→</span>
        <div class="flow-box" style="background:#E1F5EE;color:#085041">⑦ RLHF 정렬</div><span class="arrow">→</span>
        <div class="flow-box" style="background:#E6F1FB;color:#0C447C">ChatGPT 탄생</div>
      </div>
      <div class="analogy-box">💡 Henry님 교육 현장 활용 핵심: 이 8개 개념을 각각 1개 언플러그드 활동으로 연결하면 수학 없이도 2시간 LLM 워크숍이 완성됩니다. 학생들이 '손으로 만져본' 개념은 잊지 않습니다.</div>
    </div>
  `;
  document.getElementById('main').innerHTML = `<div class="overview-grid">${cards}</div><div class="content-area">${flowHtml}</div>`;
}

function renderTopic(idx) {
  const t = topics[idx];
  let visHtml = '';
  if(t.visType==='token') {
    visHtml = `<div class="section-label" style="margin-top:4px">토큰화 예시</div>`+
      t.tokens.map(tk=>`
        <div class="vis-row">
          <span class="token" style="background:#F1EFE8;color:#2C2C2A">${tk.word}</span>
          <span class="arrow">→</span>
          ${tk.toks.map(w=>`<span class="token" style="background:${tk.c};color:${tk.tc}">${w}</span>`).join('')}
        </div>
      `).join('');
  } else if(t.visType==='attn') {
    const words = ['고양이','가','생선을','먹었','다'];
    const weights = [
      [0.1,0.05,0.7,0.1,0.05],
      [0.2,0.1,0.1,0.5,0.1],
      [0.05,0.05,0.3,0.5,0.1]
    ];
    const greens = ['#E1F5EE','#9FE1CB','#5DCAA5','#1D9E75','#0F6E56'];
    visHtml = `<div class="section-label" style="margin-top:4px">Attention 가중치 예시 (어두울수록 더 주목)</div>
      <div class="attn-demo">
        <div class="attn-row"><span class="attn-src"></span><div class="attn-cells">${words.map(w=>`<div class="attn-cell" style="background:transparent;font-size:11px;color:var(--color-text-secondary)">${w}</div>`).join('')}</div></div>
        ${weights.map((row,ri)=>`
          <div class="attn-row">
            <span class="attn-src">${['먹었','생선을','고양이'][ri]}</span>
            <div class="attn-cells">${row.map(v=>`<div class="attn-cell" style="background:${greens[Math.min(4,Math.floor(v*6))]}; color:#085041">${Math.round(v*100)}%</div>`).join('')}</div>
          </div>
        `).join('')}
      </div>`;
  }
  if(t.sizes) {
    visHtml = `<div class="section-label" style="margin-top:4px">모델 크기 비교</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${t.sizes.map(s=>`
          <div style="padding:8px 10px;border-radius:var(--border-radius-md);background:${s.c};display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;font-weight:500;color:var(--color-text-primary)">${s.name}</span>
            <span style="font-size:11px;color:var(--color-text-secondary)">${s.params}</span>
          </div>`).join('')}
      </div>`;
  }
  if(t.timeline) {
    visHtml = `<div class="section-label" style="margin-top:4px">역사 타임라인</div>
      <div class="timeline">
        ${t.timeline.map((row,i)=>`
          <div class="tl-row">
            <div class="tl-dot-wrap">
              <div class="tl-dot" style="background:${row.c}"></div>
              ${i<t.timeline.length-1?`<div class="tl-line"></div>`:''}
            </div>
            <div class="tl-content"><span class="tl-year">${row.y}</span><div class="tl-text">${row.txt}</div></div>
          </div>`).join('')}
      </div>`;
  }

  const flowSec = (t.flow||[]).map(f=>`
    <div class="flow-row" style="margin:4px 0">
      ${f.boxes.map((b,bi)=>`
        <div class="flow-box" style="background:${f.colors[bi]};color:${darken(f.colors[bi])}">${b}</div>
        ${bi<f.boxes.length-1?`<span class="arrow">→</span>`:''}
      `).join('')}
    </div>`).join('');

  const html = `
    <div class="content-area">
      <div class="card" style="${idx<=4?'grid-column:1/-1':''}">
        <div class="card-head">
          <div class="card-icon" style="background:${t.color}">${t.icon}</div>
          <div><div class="card-title">${t.title}</div><div class="card-sub">${t.sub}</div></div>
        </div>
        <div class="divider"></div>
        <div class="section-label">핵심 개념</div>
        <div class="body-text">${t.concept}</div>
        ${t.concept2?`<div class="body-text" style="margin-top:4px">${t.concept2}</div>`:''}
        ${visHtml}
        ${flowSec}
      </div>
      <div class="card">
        <div class="section-label">직관적 비유</div>
        <div class="analogy-box">${t.analogy}</div>
        <div class="section-label" style="margin-top:6px">🏫 교육 현장 활용 (코딩앤플레이)</div>
        ${t.classroom.map(c=>`<div class="tip-row"><div class="tip-dot"></div><div class="tip-text">${c}</div></div>`).join('')}
        <div class="tag-row" style="margin-top:6px">
          ${t.tags.map(tag=>`<span class="tag" style="background:var(--color-background-secondary);border-color:var(--color-border-tertiary);color:var(--color-text-secondary)">${tag}</span>`).join('')}
        </div>
        <button class="ask-btn" onclick="sendPrompt('${t.title} 개념을 코딩앤플레이 학생들에게 가르치는 언플러그드 활동이나 수업 설계를 자세하게 만들어줘')">
          <i class="ti ti-arrow-right" aria-hidden="true"></i> 이 개념 수업 설계 만들어줘 ↗
        </button>
      </div>
    </div>`;
  document.getElementById('main').innerHTML = html;
}

function darken(hex) {
  const map={'#B4B2A9':'#2C2C2A','#AFA9EC':'#26215C','#5DCAA5':'#04342C','#534AB7':'#fff','#3C3489':'#fff','#9FE1CB':'#04342C','#B5D4F4':'#042C53','#CECBF6':'#26215C','#FAC775':'#412402','#F5C4B3':'#4A1B0C','#85B7EB':'#042C53','#1D9E75':'#fff','#085041':'#fff','#E1F5EE':'#085041','#E6F1FB':'#0C447C','#FAEEDA':'#633806','#FAECE7':'#4A1B0C','#EEEDFE':'#26215C','#F1EFE8':'#2C2C2A'};
  return map[hex]||'#1a1a1a';
}

renderOverview();
</script>
